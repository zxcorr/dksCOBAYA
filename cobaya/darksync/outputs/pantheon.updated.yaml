theory:
  cobaya.theories.darksync.dkscobaya.dksLCDM:
    speed: -1
    stop_at_error: false
    version: null
    input_params:
    - H0
    - Omega_dm
    - Omega_b
    output_params:
    - rdrag
likelihood:
  sn.pantheonplus:
    path: null
    dataset_file: PantheonPlus/config.dataset
    dataset_params: null
    aliases:
    - PantheonPlus
    use_abs_mag: false
    speed: 100
    type: SN
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
params:
  H0:
    prior:
      dist: uniform
      min: 60.0
      max: 80.0
    proposal: 0.5
    latex: H_0
  Omega_dm:
    prior:
      dist: uniform
      min: 0.01
      max: 0.45
    ref:
      dist: norm
      loc: 0.12
      scale: 0.26
    proposal: 0.0005
    latex: \Omega_\mathrm{dm}
  Omega_b:
    prior:
      dist: uniform
      min: 0.001
      max: 0.1
    ref:
      dist: norm
      loc: 0.04
      scale: 0.0002
    proposal: 0.0001
    latex: \Omega_b
  rdrag:
    derived: true
    latex: r_\mathrm{drag}
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: .inf
    covmat: null
    covmat_params: null
    proposal_scale: 2.4
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: .inf
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - H0
        - Omega_dm
        - Omega_b
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: '3.6'
output: pantheon
version: '3.6'
