theory:
  classy:
    stop_at_error: False
    extra_args:
      YHe: 0.2454
      recombination: RECFAST
      Omega_k: 0.0
      Omega_fld: 0
      Omega_scf: 0
      N_ur: 0.00641
      N_ncdm: 1
      deg_ncdm: 3
      m_ncdm: 0.42

likelihood:
  sn.pantheonplus:

params:
  H0:
    prior:
      dist: uniform
      min: 60.0
      max: 80.0
    proposal: 0.5
    latex: H_0

  ombh2:
    prior:
      dist: uniform
      min: 0.005
      max: 0.040
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.001
    proposal: 0.001
    latex: \Omega_b h^2
    drop: True          # CLASS doesn't know ombh2

  omch2:
    prior:
      dist: uniform
      min: 0.05
      max: 0.25
    ref:
      dist: norm
      loc: 0.120
      scale: 0.003
    proposal: 0.002
    latex: \Omega_c h^2
    drop: True          # CLASS doesn't know omch2

  Omega_b:              # what CLASS actually receives
    value: "lambda ombh2, H0: ombh2 / (H0/100)**2"
    derived: false

  Omega_cdm:            # what CLASS actually receives
    value: "lambda omch2, H0: omch2 / (H0/100)**2"
    derived: false

  rdrag:
    derived: true
    latex: r_\mathrm{drag}

  omegam:
    derived: true
    latex: \Omega_m

  omegamh2:
    derived: "lambda ombh2, omch2: ombh2 + omch2"
    latex: \Omega_m h^2

  Omega_Lambda:
    derived: true
    latex: \Omega_\Lambda

sampler:
  mcmc:
    learn_proposal: True
    learn_proposal_Rminus1_max: 30.0
    Rminus1_stop: 0.01
    max_tries: .inf

force: True
output: /data/AMARINS/dksCOBAYA/cobaya_outputs/class_pantheon