theory:
  camb:
    stop_at_error: False
    extra_args:
      nonlinear: False
      num_massive_neutrinos: 3
      neutrino_hierarchy: degenerate
      mnu: 1.26
      nnu: 3.044

likelihood:
  sn.pantheonplus:

params:
  H0:
    prior:
      dist: uniform
      min: 60.0
      max: 80.0
    proposal: 0.5
    latex: H_0

  ombh2:
    prior:
      dist: uniform
      min: 0.005
      max: 0.040
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.001
    proposal: 0.001
    latex: \Omega_b h^2

  omch2:
    prior:
      dist: uniform
      min: 0.05
      max: 0.25
    ref:
      dist: norm
      loc: 0.120
      scale: 0.003
    proposal: 0.002
    latex: \Omega_c h^2

  omk:
    value: 0.0
    latex: \Omega_k

  rdrag:
    derived: true
    latex: r_\mathrm{drag}

  omegam:
    derived: true
    latex: \Omega_m

  omegamh2:
    derived: "lambda ombh2, omch2: ombh2 + omch2"
    latex: \Omega_m h^2

  Omega_Lambda:
    derived: "lambda omegam: 1 - omegam"
    latex: \Omega_\Lambda

sampler:
  mcmc:
    learn_proposal: True
    learn_proposal_Rminus1_max: 30.0
    Rminus1_stop: 0.01
    max_tries: .inf

force: True
output: /data/AMARINS/dksCOBAYA/cobaya_outputs/camb_pantheon